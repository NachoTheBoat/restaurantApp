<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="main.css">
    /*//Fonts----------//*/
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant App</title>
</head>
<body>

    <div class="container">
        <header>
            <div class="title flex">
                <h1 class="white"> Jimmy's Diner </h1>
                <h2 class="white">The best burgers and pizzas in town</h2>

            </div>
            
        </header>

        <section id="itemList">


        </section>
            
        <section class="orderItems hidden" id="orderItemsSection">
            <h2>your order</h2>
            <div  id="itemsOrderList">

            </div>

            <div>
               
            </div>
            <button data-action="complete">Complete order</button>

             <h2 id="OrderTotalPrice"></h2>


        </section>

        <section class="inputSection">
            <div class="modal hidden" id="paymentModal">
                
                
               <form>
                <button class="closeModalBtn" data-action="close">×</button>
                        
                            <input 
                                    type="text" 
                                    id="name" 
                                    name="name"
                                    placeholder="Enter your name" required>
                        
                            <input 
                                   type="text" 
                                   id="card" 
                                   name="card" 
                                   placeholder="Enter your card number" required>
                        
                            <input type="text" 
                                    id="cvv" 
                                    name="cvv"
                                    placeholder="123" 
                                    inputmode="numeric" 
                                    autocomplete="cc-csc" 
                                    maxlength="4" >

                            <button type="submit">Pay Now</button>
               </form>
                
            </div>
        </section>
        
    </div>
    
    


    
    
</body>
<script src="index.js" type="module"></script>
</html>
